version: '3.9'

# Isolated integration-test stack.
# Dev ports: postgres 5432, redis 6379
# Test ports: postgres 5433, redis 6380

services:
  postgres_test:
    image: postgres:16-alpine
    container_name: jupiter_postgres_test
    environment:
      POSTGRES_DB: jupiter_plan_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password_local
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d jupiter_plan_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jupiter_test_network

  redis_test:
    image: redis:7-alpine
    container_name: jupiter_redis_test
    command: redis-server --requirepass test_redis_password
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jupiter_test_network

volumes:
  postgres_test_data:
    name: jupiter_postgres_test_data

networks:
  jupiter_test_network:
    name: jupiter_test_network
    driver: bridge
